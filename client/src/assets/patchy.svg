  <!-- Circuit lines -->
  <line x1="8"  y1="17" x2="24" y2="17" stroke="#E0F7FA" stroke-width="1.4" opacity="0.6"/>
  <line x1="11" y1="12" x2="11" y2="23" stroke="#E0F7FA" stroke-width="1.4" opacity="0.6"/>
  <line x1="16" y1="10" x2="16" y2="26" stroke="#E0F7FA" stroke-width="1.4" opacity="0.6"/>
  <line x1="21" y1="12" x2="21" y2="23" stroke="#E0F7FA" stroke-width="1.4" opacity="0.6"/>
  <line x1="11" y1="12" x2="21" y2="12" stroke="#E0F7FA" stroke-width="1.4" opacity="0.6"/>
  <line x1="11" y1="23" x2="21" y2="23" stroke="#E0F7FA" stroke-width="1.4" opacity="0.6"/>

  <!-- Circuit nodes -->
  <circle cx="11" cy="12" r="1.8" fill="#E0F7FA"/>
  <circle cx="21" cy="12" r="1.8" fill="#E0F7FA"/>
  <circle cx="11" cy="17" r="1.8" fill="#E0F7FA"/>
  <circle cx="16" cy="17" r="2.6" fill="white"/>
  <circle cx="21" cy="17" r="1.8" fill="#E0F7FA"/>
  <circle cx="11" cy="23" r="1.8" fill="#E0F7FA"/>
  <circle cx="21" cy="23" r="1.8" fill="#E0F7FA"/>

  <!-- Red alert dot -->
  <circle cx="25" cy="8" r="5" fill="#F43F5E"/>
  <text x="25" y="11.5" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="white">!</text>
</svg>
